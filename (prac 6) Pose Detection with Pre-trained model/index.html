<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pose Detection</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}

h1 { margin-top: 20px; }

canvas {
  margin-top: 15px;
  border-radius: 10px;
}

button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.start { background: green; color: white; }
.stop { background: red; color: white; }

#result {
  font-size: 20px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>Pose Detection (Standing / Sitting)</h1>

<button class="start" onclick="startCamera()">Start Camera</button>
<button class="stop" onclick="stopCamera()">Stop</button>

<br>

<!-- Hidden video -->
<video id="video" width="500" height="400" autoplay muted style="display:none;"></video>

<canvas id="canvas" width="500" height="400"></canvas>

<div id="result">Result: ---</div>

<script>

let model;
let videoStream;
let running = false;

// ✅ Load PoseNet
async function loadModel() {
  model = await posenet.load();
  console.log("Model Loaded");
}
loadModel();

// ✅ Start camera
async function startCamera() {
  const video = document.getElementById("video");

  videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = videoStream;

  video.onloadedmetadata = () => {
    video.play();
    running = true;
    detectPose();
  };
}

// ✅ Stop camera
function stopCamera() {
  running = false;
  if (videoStream) {
    videoStream.getTracks().forEach(track => track.stop());
  }
}

// ✅ Detection loop
async function detectPose() {
  if (!running) return;

  const video = document.getElementById("video");

  // Prevent 0x0 error
  if (video.readyState !== 4) {
    requestAnimationFrame(detectPose);
    return;
  }

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const pose = await model.estimateSinglePose(video);

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  drawPoints(pose.keypoints, ctx);
  classifyPose(pose);

  requestAnimationFrame(detectPose);
}

// ✅ Draw keypoints
function drawPoints(points, ctx) {
  points.forEach(p => {
    if (p.score > 0.5) {
      ctx.beginPath();
      ctx.arc(p.position.x, p.position.y, 5, 0, 2 * Math.PI);
      ctx.fillStyle = "cyan";
      ctx.fill();
    }
  });
}

// ✅ FINAL SMART CLASSIFICATION (BEST)
function classifyPose(pose) {

  const hip = pose.keypoints.find(p => p.part === "leftHip");
  const knee = pose.keypoints.find(p => p.part === "leftKnee");
  const ankle = pose.keypoints.find(p => p.part === "leftAnkle");
  const shoulder = pose.keypoints.find(p => p.part === "leftShoulder");

  if (hip && knee && ankle && shoulder &&
      hip.score > 0.5 && knee.score > 0.5 &&
      ankle.score > 0.5 && shoulder.score > 0.5) {

    // 🔥 Body proportions
    let torso = Math.abs(shoulder.position.y - hip.position.y);
    let leg = Math.abs(ankle.position.y - hip.position.y);
    let kneeBend = Math.abs(knee.position.y - hip.position.y);

    let ratio = leg / torso;

    // ✅ Decision
    if (ratio > 1.3 && kneeBend < leg * 0.6) {
      document.getElementById("result").innerText = "Result: Standing 🧍";
    } else {
      document.getElementById("result").innerText = "Result: Sitting 🪑";
    }

  } else {
    document.getElementById("result").innerText = "Result: Detecting...";
  }
}

</script>

</body>
</html>
